<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    linear-gradient(
    rgba(0,0,0,0.45),
    rgba(0,0,0,0.45)
    ),
    url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");

    background-size:cover;
    background-position:center;
}

/* Login Card */

.login-card{

    width:420px;

    background:rgba(255,255,255,0.95);

    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:40px;

    box-shadow:
    0 10px 35px rgba(0,0,0,0.25);

    animation:fadeIn 1s ease;
}

.login-card h2{

    text-align:center;

    font-weight:bold;

    color:#1e3a5f;

    margin-bottom:10px;
}

.login-card p{

    text-align:center;

    color:#666;

    margin-bottom:25px;
}

.form-control{

    border-radius:12px;

    padding:12px;
}

.form-control:focus{

    box-shadow:none;

    border-color:#1e3a5f;
}

.login-btn{

    width:100%;

    background:#1e3a5f;

    color:white;

    border:none;

    padding:12px;

    border-radius:12px;

    font-weight:bold;

    transition:0.4s;
}

.login-btn:hover{

    background:#294f80;

    transform:translateY(-3px);
}

.home-btn{

    width:100%;

    margin-top:12px;

    border-radius:12px;
}

.logo{

    text-align:center;

    font-size:60px;

    margin-bottom:15px;
}

.footer-text{

    text-align:center;

    margin-top:20px;

    color:#777;

    font-size:13px;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="login-card">

    <div class="logo">
        🌍
    </div>

    <h2>
        Climate Admin Login
    </h2>

    <p>
        Climate Change Analysis & Prioritization System
    </p>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                <i class="fa-solid fa-user"></i>
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter Username"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                <i class="fa-solid fa-lock"></i>
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password"
                required>

        </div>

        <button
            type="submit"
            class="login-btn">

            <i class="fa-solid fa-right-to-bracket"></i>
            Login

        </button>

    </form>

    {% if error %}

    <div class="alert alert-danger mt-3">

        {{ error }}

    </div>

    {% endif %}

    <a href="/"
       class="btn btn-outline-secondary home-btn">

       🏠 Back to Home

    </a>

    <div class="footer-text">

        AI Powered Climate Intelligence Dashboard

        <br>

        Flask • Python • Machine Learning

    </div>

</div>

</body>

</html>

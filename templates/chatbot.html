<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Climate Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
    font-family:'Segoe UI',sans-serif;
}

.hero{

    background:linear-gradient(
    135deg,
    #1e3a5f,
    #2e8b57
    );

    color:white;

    padding:60px;

    text-align:center;
}

.chat-card{

    background:white;

    border-radius:20px;

    padding:30px;

    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.bot-response{

    background:#eef7ff;

    border-left:5px solid #1e3a5f;

    padding:15px;

    border-radius:10px;
}

</style>

</head>

<body>

<div class="hero">

<h1>
🤖 AI Climate Assistant
</h1>

<p>
Ask climate-related questions and get instant answers.
</p>

</div>

<div class="container mt-5">

<div class="chat-card">

<form method="POST">

<label class="form-label">

Enter Your Question

</label>

<input
type="text"
name="question"
class="form-control"
placeholder="Example: What is climate change?"
required>

<br>

<button
type="submit"
class="btn btn-success">

Ask AI Assistant

</button>

</form>

{% if response %}

<hr>

<h4>
🤖 Assistant Response
</h4>

<div class="bot-response">

{{ response }}

</div>

{% endif %}

<br>

<a href="/"
class="btn btn-primary">

🏠 Back Home

</a>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
